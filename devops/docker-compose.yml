version: "3.9"

services:
  backend:
    build:
      context: ..          # project root (so COPY backend/ works)
      dockerfile: devops/Dockerfile
    container_name: resume-matcher-backend
    ports:
      - "5000:5000"
    volumes:
      - warehouse_data:/app/data   # persist the SQLite warehouse between restarts
    environment:
      - DB_PATH=/app/data/warehouse.db
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  warehouse_data:
    driver: local
