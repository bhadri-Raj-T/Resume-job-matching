<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResuMatch — AI Resume Matching</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="app">

  <!-- ═══ SIDEBAR ═══ -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">R</div>
      <div class="logo-text">
        <div class="logo-name">ResuMatch</div>
        <div class="logo-sub">AI Matching</div>
      </div>
    </div>

    <div class="nav-section-label">Main Menu</div>
    <nav id="nav-menu">

      <div class="nav-item active" data-page="dashboard">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="2" width="7" height="7" rx="1"/>
          <rect x="11" y="2" width="7" height="7" rx="1"/>
          <rect x="2" y="11" width="7" height="7" rx="1"/>
          <rect x="11" y="11" width="7" height="7" rx="1"/>
        </svg>
        Dashboard
      </div>

      <div class="nav-item" data-page="match">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 3h8l4 4v10a1 1 0 01-1 1H4a1 1 0 01-1-1V4a1 1 0 011-1z"/>
          <path d="M12 3v5h4M7 9h6M7 13h4"/>
        </svg>
        Match Resume
      </div>

      <div class="nav-item" data-page="upload">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M10 13V4m0 0L7 7m3-3l3 3"/>
          <path d="M3 15v1a1 1 0 001 1h12a1 1 0 001-1v-1"/>
        </svg>
        Upload Resume
      </div>

      <div class="nav-item" data-page="jobs">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="7" width="16" height="11" rx="1"/>
          <path d="M7 7V5a3 3 0 016 0v2"/>
          <line x1="10" y1="11" x2="10" y2="14"/>
        </svg>
        Browse Jobs
      </div>

      <div class="nav-item" data-page="companies">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="8" width="16" height="10" rx="1"/>
          <path d="M6 8V5a1 1 0 011-1h6a1 1 0 011 1v3"/>
          <line x1="10" y1="2" x2="10" y2="4"/>
          <line x1="7" y1="12" x2="7" y2="14"/>
          <line x1="10" y1="12" x2="10" y2="14"/>
          <line x1="13" y1="12" x2="13" y2="14"/>
        </svg>
        Companies
      </div>

      <div class="nav-item" data-page="history">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="10" cy="10" r="7"/>
          <polyline points="10,6 10,10 13,12"/>
          <path d="M3 3l2 2"/>
        </svg>
        Match History
      </div>

    </nav>

    <div class="sidebar-footer">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-text" id="status-text">Checking...</span>
    </div>
  </aside>

  <!-- ═══ HAMBURGER (mobile) ═══ -->
  <button id="hamburger" onclick="toggleSidebar()">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="white">
      <rect y="2"  width="18" height="2" rx="1"/>
      <rect y="8"  width="18" height="2" rx="1"/>
      <rect y="14" width="18" height="2" rx="1"/>
    </svg>
  </button>
  <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="toggleSidebar()"></div>

  <!-- ═══ MAIN ═══ -->
  <main id="main">
    <div id="content">

      <!-- Top Bar -->
      <div class="topbar">
        <div class="topbar-left">
          <h1 id="page-title">Dashboard</h1>
          <p id="page-subtitle">Overview of your resume matching system</p>
        </div>
        <div class="topbar-pills" id="topbar-pills">
          <div class="stat-pill">
            <span class="stat-pill-dot" style="background:#10B981"></span>
            <span id="pill-jobs">— Jobs</span>
          </div>
          <div class="stat-pill">
            <span class="stat-pill-dot" style="background:#4F46E5"></span>
            <span id="pill-resumes">— Resumes</span>
          </div>
          <div class="stat-pill">
            <span class="stat-pill-dot" style="background:#06B6D4"></span>
            Active
          </div>
        </div>
      </div>

      <!-- Page Content (swapped by JS) -->
      <div id="page-content"></div>

    </div>
  </main>

</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- ═══ SCRIPTS (order matters) ═══ -->
<script src="js/api.js"></script>
<script src="js/pages/dashboard.js"></script>
<script src="js/pages/match.js"></script>
<script src="js/pages/upload.js"></script>
<script src="js/pages/jobs.js"></script>
<script src="js/pages/companies.js"></script>
<script src="js/pages/history.js"></script>
<script src="js/app.js"></script>

</body>
</html>
